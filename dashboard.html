<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>北京住宅项目户型面宽分析看板</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Hiragino Sans GB',sans-serif;background:#f5f5f0;color:#2c2c2a;font-size:13px;line-height:1.6}
.header{background:#fff;border-bottom:.5px solid rgba(0,0,0,.08);padding:16px 24px;display:flex;justify-content:space-between;align-items:center}
.header h1{font-size:15px;font-weight:500}
.header .subtitle{font-size:12px;color:#888780;margin-top:2px}

/* Filter bar */
.filters{background:#fff;border-bottom:.5px solid rgba(0,0,0,.08);padding:10px 24px;display:flex;gap:12px;flex-wrap:wrap;align-items:flex-start}
.filter-group{position:relative;display:flex;flex-direction:column;gap:3px}
.filter-group>label{font-size:11px;color:#888780;font-weight:500}
.filter-trigger{font-size:13px;padding:6px 28px 6px 10px;border:.5px solid rgba(0,0,0,.15);border-radius:6px;background:#fff;color:#2c2c2a;min-width:150px;cursor:pointer;text-align:left;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;position:relative;line-height:1.4}
.filter-trigger::after{content:'';position:absolute;right:8px;top:50%;transform:translateY(-50%);border-left:4px solid transparent;border-right:4px solid transparent;border-top:5px solid #888}
.filter-trigger.active{border-color:#378ADD}
.filter-dropdown{display:none;position:absolute;top:100%;left:0;right:0;z-index:100;background:#fff;border:.5px solid rgba(0,0,0,.12);border-radius:8px;margin-top:3px;max-height:200px;overflow-y:auto;box-shadow:0 4px 12px rgba(0,0,0,.08);min-width:180px}
.filter-dropdown.show{display:block}
.filter-dropdown .search-input{position:sticky;top:0;padding:6px 8px;background:#fff;z-index:1;border-bottom:.5px solid rgba(0,0,0,.06)}
.filter-dropdown .search-input input{width:100%;padding:5px 8px;border:.5px solid rgba(0,0,0,.12);border-radius:4px;font-size:12px;outline:none}
.filter-dropdown .all-toggle{padding:6px 10px;font-size:12px;color:#378ADD;cursor:pointer;border-bottom:.5px solid rgba(0,0,0,.06);user-select:none}
.filter-dropdown .all-toggle:hover{background:#f1efe8}
.filter-option{display:flex;align-items:center;gap:8px;padding:5px 10px;cursor:pointer;font-size:12px;user-select:none}
.filter-option:hover{background:#f5f5f0}
.filter-option input[type=checkbox]{accent-color:#378ADD;cursor:pointer}
.filter-option .count{margin-left:auto;color:#888;font-size:11px}
.btn-reset{font-size:12px;padding:6px 12px;border:.5px solid rgba(0,0,0,.15);border-radius:6px;background:transparent;color:#5f5e5a;cursor:pointer;margin-top:15px;white-space:nowrap}
.btn-reset:hover{background:#f1efe8}

/* Stats bar */
.stats-bar{background:#fff;border-bottom:.5px solid rgba(0,0,0,.08);padding:8px 24px;font-size:12px;color:#888780;display:flex;justify-content:space-between}
.stats-bar .info span{color:#2c2c2a;font-weight:500}

/* Container */
.container{padding:16px 24px;max-width:1400px;margin:0 auto}

/* Metric cards */
.metrics-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:10px;margin-bottom:16px}
.metric-card{background:#f1efe8;border-radius:8px;padding:12px 14px}
.metric-card .label{font-size:12px;color:#5f5e5a;margin-bottom:2px}
.metric-card .value{font-size:20px;font-weight:500;color:#2c2c2a}
.metric-card .detail{font-size:11px;color:#888780;margin-top:1px}

/* Charts */
.charts-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:16px}
@media(max-width:900px){.charts-grid{grid-template-columns:1fr}}
.chart-card{background:#fff;border:.5px solid rgba(0,0,0,.08);border-radius:12px;padding:14px}
.chart-card h3{font-size:13px;font-weight:500;color:#2c2c2a;margin-bottom:10px}
.chart-card .chart-wrap{position:relative;width:100%}
.chart-card canvas{width:100%!important;max-height:280px}
.chart-full{grid-column:1/-1}

/* Table */
.table-card{background:#fff;border:.5px solid rgba(0,0,0,.08);border-radius:12px;padding:14px;overflow-x:auto}
.table-card h3{font-size:13px;font-weight:500;color:#2c2c2a;margin-bottom:10px}
table{width:100%;border-collapse:collapse;font-size:12px}
th{background:#f1efe8;color:#5f5e5a;font-weight:500;padding:8px 12px;text-align:left;border-bottom:.5px solid rgba(0,0,0,.08);white-space:nowrap}
td{padding:6px 12px;border-bottom:.5px solid rgba(0,0,0,.04);color:#2c2c2a;white-space:nowrap}
tr:hover td{background:#fafaf7}
.sortable{cursor:pointer;user-select:none;white-space:nowrap;padding:4px 0;display:inline-flex;align-items:center;gap:6px}
.sortable:hover{background:#e5e3db}
.sort-arrow{font-size:13px;color:#aaa;width:18px;text-align:center}
.sort-arrow.asc{color:#378ADD}
.sort-arrow.desc{color:#378ADD}

/* Column filter icon — bigger click area */
.filter-icon{margin-left:6px;cursor:pointer;font-size:15px;color:#999;user-select:none;display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:4px;background:transparent}
.filter-icon:hover,.filter-icon.active{color:#fff;background:#378ADD}

/* Column filter dropdown */
.col-filter-dropdown{display:none;position:absolute;z-index:200;background:#fff;border:.5px solid rgba(0,0,0,.12);border-radius:8px;margin-top:3px;max-height:220px;overflow-y:auto;box-shadow:0 4px 12px rgba(0,0,0,.1);min-width:160px;padding:4px 0}
.col-filter-dropdown.show{display:block}
.col-filter-dropdown .cf-all{padding:5px 10px;font-size:12px;color:#378ADD;cursor:pointer;border-bottom:.5px solid rgba(0,0,0,.06);user-select:none;white-space:nowrap}
.col-filter-dropdown .cf-all:hover{background:#f5f5f0}
.col-filter-dropdown .cf-item{display:flex;align-items:center;gap:6px;padding:4px 10px;cursor:pointer;font-size:12px;user-select:none;white-space:nowrap}
.col-filter-dropdown .cf-item:hover{background:#f5f5f0}
.col-filter-dropdown .cf-item input[type=checkbox]{accent-color:#378ADD;cursor:pointer;margin:0}
.col-filter-dropdown .cf-item .cf-count{margin-left:auto;color:#888;font-size:11px}
.tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:500}
.tag-2{background:#e6f1fb;color:#185fa5}
.tag-3{background:#e1f5ee;color:#0f6e56}
.tag-4{background:#faeeda;color:#854f0b}

/* 户型图缩略图 */
.img-thumb{width:60px;height:60px;object-fit:cover;border-radius:4px;cursor:pointer;border:.5px solid rgba(0,0,0,.08);transition:opacity .15s}
.img-thumb:hover{opacity:.8}
.img-placeholder{width:60px;height:60px;background:#f1efe8;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:10px;color:#bbb}

/* Lightbox overlay */
.lightbox{display:none;position:fixed;z-index:9999;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.75);align-items:center;justify-content:center}
.lightbox.show{display:flex}
.lightbox img{max-width:90%;max-height:90%;border-radius:4px;box-shadow:0 8px 32px rgba(0,0,0,.3)}
.lightbox .close{position:absolute;top:20px;right:30px;font-size:32px;color:#fff;cursor:pointer;opacity:.8;line-height:1}
.lightbox .close:hover{opacity:1}
</style>
</head>

<div class="header">
  <div>
    <h1>北京住宅项目户型面宽分析看板</h1>
    <div class="subtitle">数据来源：北京住宅项目户型汇总.xlsx · 共 <span id="totalCount">172</span> 条户型记录</div>
  </div>
  <button class="btn-reset" onclick="resetAllFilters()" style="margin-top:0">重置全部筛选</button>
</div>

<div class="filters" id="filterBar"></div>

<div class="container">

  </div>
  <div class="table-card">
    <h3>明细数据 <span id="detailCount" style="font-weight:400;color:#888;font-size:12px">（172 条）</span></h3>
    <div style="position:relative">
    <table><thead><tr>
      <th data-sort="idx" class="sortable" onclick="sortTable('idx')"># <span class="sort-arrow"></span></th>
      <th data-sort="d" data-filter="d" class="sortable" onclick="sortTable('d')">行政区 <span class="sort-arrow"></span><span class="filter-icon" onclick="event.stopPropagation();toggleColFilter('d')">▾</span><div class="col-filter-dropdown" id="cf-d"></div></th>

      <th data-sort="o" data-filter="o" class="sortable" onclick="sortTable('o')">首开时间 <span class="sort-arrow"></span><span class="filter-icon" onclick="event.stopPropagation();toggleColFilter('o')">▾</span><div class="col-filter-dropdown" id="cf-o"></div></th>
      <th data-sort="t" data-filter="t" class="sortable" onclick="sortTable('t')">业态 <span class="sort-arrow"></span><span class="filter-icon" onclick="event.stopPropagation();toggleColFilter('t')">▾</span><div class="col-filter-dropdown" id="cf-t"></div></th>
      <th data-sort="a" data-filter="a" class="sortable" onclick="sortTable('a')">面积(㎡) <span class="sort-arrow"></span><span class="filter-icon" onclick="event.stopPropagation();toggleColFilter('a')">▾</span><div class="col-filter-dropdown" id="cf-a"></div></th>
      <th data-sort="c" data-filter="c" class="sortable" onclick="sortTable('c')">面宽数 <span class="sort-arrow"></span><span class="filter-icon" onclick="event.stopPropagation();toggleColFilter('c')">▾</span><div class="col-filter-dropdown" id="cf-c"></div></th>
      <th data-sort="l" data-filter="l" class="sortable" onclick="sortTable('l')">客厅面宽 <span class="sort-arrow"></span><span class="filter-icon" onclick="event.stopPropagation();toggleColFilter('l')">▾</span><div class="col-filter-dropdown" id="cf-l"></div></th>
      <th data-sort="m" data-filter="m" class="sortable" onclick="sortTable('m')">主卧面宽 <span class="sort-arrow"></span><span class="filter-icon" onclick="event.stopPropagation();toggleColFilter('m')">▾</span><div class="col-filter-dropdown" id="cf-m"></div></th>
      <th data-sort="b1" data-filter="b1" class="sortable" onclick="sortTable('b1')">次卧1面宽 <span class="sort-arrow"></span><span class="filter-icon" onclick="event.stopPropagation();toggleColFilter('b1')">▾</span><div class="col-filter-dropdown" id="cf-b1"></div></th>
      <th data-sort="b2" data-filter="b2" class="sortable" onclick="sortTable('b2')">次卧2面宽 <span class="sort-arrow"></span><span class="filter-icon" onclick="event.stopPropagation();toggleColFilter('b2')">▾</span><div class="col-filter-dropdown" id="cf-b2"></div></th>
      <th>户型图</th>
    </tr></thead><tbody id="tableBody"></tbody></table>
    </div>
  </div>
</div>

<!-- Lightbox overlay -->
<div class="lightbox" id="lightbox" onclick="closeLightbox(event)">
  <span class="close" onclick="closeLightbox()">&times;</span>
  <img id="lightboxImg" src="" alt="户型图放大">
</div>

      </div>
    </div>
  `).join('');

  // Close dropdowns on outside click
  document.addEventListener('click', function(e) {
    if (!e.target.closest('.filter-group')) {
      document.querySelectorAll('.filter-dropdown.show').forEach(d => d.classList.remove('show'));
      document.querySelectorAll('.filter-trigger.active').forEach(t => t.classList.remove('active'));
    }
    // Close column filter dropdowns
    if (!e.target.closest('.col-filter-dropdown') && !e.target.closest('.filter-icon')) {
      document.querySelectorAll('.col-filter-dropdown.show').forEach(d => d.classList.remove('show'));
      document.querySelectorAll('.filter-icon.active').forEach(i => i.classList.remove('active'));
    }
  });
}

function toggleDropdown(trigger) {
  const dropdown = trigger.nextElementSibling;
  const isOpen = dropdown.classList.contains('show');
  document.querySelectorAll('.filter-dropdown.show').forEach(d => d.classList.remove('show'));
  document.querySelectorAll('.filter-trigger.active').forEach(t => t.classList.remove('active'));
  if (!isOpen) {
    dropdown.classList.add('show');
    trigger.classList.add('active');
  }
}

function toggleAll(el) {
  const container = el.parentElement;
  const checkboxes = container.querySelectorAll('input[type=checkbox]');
  const allChecked = Array.from(checkboxes).every(cb => cb.checked);
  checkboxes.forEach(cb => cb.checked = !allChecked);
  onFilterChange(null);
}

function onFilterChange(_el) {
  document.querySelectorAll('.filter-group').forEach(group => {
    const key = group.dataset.key;
    const checkboxes = group.querySelectorAll('input[type=checkbox]');
    const checked = Array.from(checkboxes).filter(cb => cb.checked).map(cb => cb.value);
    const trigger = group.querySelector('.filter-trigger');
    if (checked.length === 0 || checked.length === checkboxes.length) {
      state[key] = new Set();
      trigger.textContent = '全部';
    } else if (checked.length <= 2) {
      state[key] = new Set(checked);
      trigger.textContent = checked.join(', ');
    } else {
      state[key] = new Set(checked);
      trigger.textContent = checked.length + ' 项';
    }
  });
  applyFilters();
}

function applyFilters() {
  // Apply table column filters on top of top-bar filters
  let base = RAW_DATA;
  // First apply top-bar filters
  base = base.filter(r => {
    if (state.district.size && !state.district.has(r.d)) return false;
    if (state.project.size && !state.project.has(r.p)) return false;
    if (state.type.size && !state.type.has(r.t)) return false;
    if (state.area.size && !state.area.has(r.ag)) return false;
    if (state.bwCount.size && !state.bwCount.has(String(r.c))) return false;
    return true;
  });
  // Then apply column filters
  filteredData = applySort(base.filter(r => {
    for (const key of COL_FILTER_KEYS) {
      const s = colFilters[key];
      if (s.size === 0) continue; // no filter on this column
      if (!s.has(key === 'c' ? String(r.c) : String(r[key] || ''))) return false;
    }
    return true;
  }));
  renderMetrics();
  renderCharts();
  renderTable();
  updateStats();
  rebuildColFilterDropdowns();
}

function toggleColFilter(key) {
  const dd = document.getElementById('cf-' + key);
  const isOpen = dd.classList.contains('show');
  // Close all other dropdowns
  document.querySelectorAll('.col-filter-dropdown.show').forEach(d => d.classList.remove('show'));
  document.querySelectorAll('.filter-icon.active').forEach(i => i.classList.remove('active'));
  if (!isOpen) {
    populateColFilter(key);
    dd.classList.add('show');
    dd.previousElementSibling.classList.add('active');
  }
}

function populateColFilter(key) {
  const dd = document.getElementById('cf-' + key);
  // Get unique values from current base (pre column-filter) data
  const vals = [...new Set(
    (state.district.size || state.project.size || state.type.size || state.area.size || state.bwCount.size
      ? filteredDataRaw() : RAW_DATA)
      .map(r => key === 'c' ? String(r.c) : String(r[key] || '—'))
      .filter(v => v !== '')
  )].sort();
  const filterSet = colFilters[key];
  const allChecked = filterSet.size === 0 || vals.every(v => filterSet.has(v));
  dd.innerHTML = '<div class="cf-all" onclick="toggleColFilterAll(\x27'+key+'\x27)">' + (allChecked ? '☑ 全选' : '☐ 全选') + '</div>' +
    vals.map(v =>
      '<label class="cf-item"><input type="checkbox" value="'+v+'" ' +
      (filterSet.size === 0 || filterSet.has(v) ? 'checked' : '') +
      ' onchange="onColFilterChange(\x27'+key+'\x27,this)"><span>'+v+'</span></label>'
    ).join('');
}

function toggleColFilterAll(key) {
  const dd = document.getElementById('cf-' + key);
  const allCb = dd.querySelector('.cf-all');
  const allChecked = allCb.textContent.startsWith('☑');
  const checkboxes = dd.querySelectorAll('.cf-item input');
  checkboxes.forEach(cb => cb.checked = !allChecked);
  colFilters[key] = allChecked ? new Set() : new Set(Array.from(checkboxes).map(cb => cb.value));
  applyFilters();
}

function onColFilterChange(key, el) {
  // When any checkbox changes, check if now all selected → reset filter, otherwise use checked set
  const dd = document.getElementById('cf-' + key);
  const checkboxes = dd.querySelectorAll('.cf-item input');
  const checked = Array.from(checkboxes).filter(cb => cb.checked);
  const all = Array.from(checkboxes);
  if (checked.length === all.length) {
    colFilters[key] = new Set(); // "all" = no filter
  } else if (checked.length === 0) {
    colFilters[key] = new Set(['__NONE__']); // dummy value so filter excludes all
  } else {
    colFilters[key] = new Set(checked.map(cb => cb.value));
  }
  applyFilters();
}

// Get data before column filtering (after top-bar filters only)
function filteredDataRaw() {
  return RAW_DATA.filter(r => {
    if (state.district.size && !state.district.has(r.d)) return false;
    if (state.project.size && !state.project.has(r.p)) return false;
    if (state.type.size && !state.type.has(r.t)) return false;
    if (state.area.size && !state.area.has(r.ag)) return false;
    if (state.bwCount.size && !state.bwCount.has(String(r.c))) return false;
    return true;
  });
}

function rebuildColFilterDropdowns() {
  // Repopulate open dropdowns so counts are current
  document.querySelectorAll('.col-filter-dropdown.show').forEach(dd => {
    const key = dd.id.replace('cf-', '');
    populateColFilter(key);
  });
}

function resetAllFilters() {
  document.querySelectorAll('.filter-group input[type=checkbox]').forEach(cb => cb.checked = false);
  document.querySelectorAll('.filter-trigger').forEach(t => t.textContent = '全部');
  Object.values(state).forEach(s => s.clear());
  COL_FILTER_KEYS.forEach(k => colFilters[k] = new Set());
  applyFilters();
}

function updateStats() {
  const match = filteredData.length;
  document.getElementById('matchCount').textContent = match;
  const detailEl = document.getElementById('detailCount');
  if (detailEl) detailEl.textContent = `（${match} 条）`;

  const activeFilters = Object.entries(state).filter(([k,v]) => v.size > 0);
  document.getElementById('filterLabel').textContent =
    activeFilters.length
      ? activeFilters.map(([k,v]) => `${{'district':'行政区','project':'项目','type':'业态','area':'面积段','bwCount':'面宽数'}[k]}: ${[...v].join(',')}`).join(' · ')
      : '全部数据';
}

// ============ SORT ============
function sortTable(key) {
  if (sortState.key === key) {
    sortState.dir = sortState.dir === 'asc' ? 'desc' : sortState.dir === 'desc' ? 'none' : 'asc';
  } else {
    sortState.key = key;
    sortState.dir = key === 'idx' ? 'asc' : 'asc';
  }
  applyFilters();
}

function applySort(arr) {
  if (sortState.dir === 'none' || sortState.key === 'idx') return arr;
  const sk = sortState.key, sd = sortState.dir;
  return [...arr].sort((a, b) => {
    let va, vb;
    if (['c','l','m','b1','b2'].includes(sk)) {
      va = parseFloat(a[sk]) || 0;
      vb = parseFloat(b[sk]) || 0;
    } else if (sk === 'a') {
      va = parseInt(a[sk]) || 0;
      vb = parseInt(b[sk]) || 0;
    } else {
      va = (a[sk] || '').toString();
      vb = (b[sk] || '').toString();
    }
    if (va < vb) return sd === 'asc' ? -1 : 1;
    if (va > vb) return sd === 'asc' ? 1 : -1;
    return 0;
  });
}

// ============ METRICS ============
function calcStats(arr) {
  const v = arr.filter(x => x != null && x > 0);
  if (!v.length) return {min:null,max:null,avg:null,cnt:0};
  return { min:Math.min(...v), max:Math.max(...v), avg:Math.round(v.reduce((a,b)=>a+b,0)/v.length), cnt:v.length };
}

function renderMetrics() {
  const totalBw = filteredData.map(r => r.c).filter(x => x);
  const living = filteredData.map(r => r.l);
  const master = filteredData.map(r => r.m);
  const bed1 = filteredData.map(r => r.b1);

  const ts = calcStats(totalBw);
  const ls = calcStats(living);
  const ms = calcStats(master);
  const bs = calcStats(bed1);

  const dist = {2:0,3:0,4:0};
  totalBw.forEach(v => { if (dist[v] !== undefined) dist[v]++; });
  const t = totalBw.length || 1;

  document.getElementById('metricsGrid').innerHTML = `
    <div class="metric-card"><div class="label">总面宽区间</div><div class="value">${ts.min != null ? ts.min+'~'+ts.max : '—'}</div><div class="detail">平均 ${ts.avg != null ? ts.avg+' mm' : '—'} · ${ts.cnt} 条</div></div>
    <div class="metric-card"><div class="label">客厅面宽区间</div><div class="value">${ls.min != null ? ls.min+'~'+ls.max : '—'}</div><div class="detail">平均 ${ls.avg != null ? ls.avg+' mm' : '—'} · ${ls.cnt} 条</div></div>
    <div class="metric-card"><div class="label">主卧面宽区间</div><div class="value">${ms.min != null ? ms.min+'~'+ms.max : '—'}</div><div class="detail">平均 ${ms.avg != null ? ms.avg+' mm' : '—'} · ${ms.cnt} 条</div></div>
    <div class="metric-card"><div class="label">次卧1面宽区间</div><div class="value">${bs.min != null ? bs.min+'~'+bs.max : '—'}</div><div class="detail">平均 ${bs.avg != null ? bs.avg+' mm' : '—'} · ${bs.cnt} 条</div></div>
    <div class="metric-card"><div class="label">面宽数量分布</div><div class="value" style="font-size:16px">2面: ${dist[2]} / 3面: ${dist[3]} / 4面: ${dist[4]}</div><div class="detail">占比 ${Math.round(dist[2]/t*100)}% / ${Math.round(dist[3]/t*100)}% / ${Math.round(dist[4]/t*100)}%</div></div>
  `;
}

// ============ CHARTS ============
function renderCharts() {
  renderBwCountChart();
  renderBwCompareChart();
  renderHistogram('chartLivingHist', filteredData.map(r => r.l).filter(x => x), '#378ADD', '客厅面宽');
  renderHistogram('chartMasterHist', filteredData.map(r => r.m).filter(x => x), '#1D9E75', '主卧面宽');
}

function renderBwCountChart() {
  const dist = {2:0,3:0,4:0};
  filteredData.forEach(r => { if (r.c && dist[r.c] !== undefined) dist[r.c]++; });
  const total = Object.values(dist).reduce((a,b)=>a+b,0) || 1;

  if (charts.bwCount) charts.bwCount.destroy();
  charts.bwCount = new Chart(document.getElementById('chartBwCount'), {
    type: 'doughnut',
    data: {
      labels: ['2面宽', '3面宽', '4面宽'],
      datasets: [{ data:[dist[2],dist[3],dist[4]], backgroundColor:['#B5D4F4','#5DCAA5','#FAC775'], borderWidth:0 }]
    },
    options: {
      responsive:true, maintainAspectRatio:true,
      plugins: {
        legend:{ position:'bottom', labels:{ font:{size:12}, padding:12 } },
        datalabels: {
          color:'#fff', font:{weight:'bold',size:13},
          formatter:(v,ctx) => v > 0 ? v + '\n' + Math.round(v/total*100) + '%' : '',
          anchor:'center', align:'center',
          display: ctx => ctx.dataset.data[ctx.dataIndex] > 0
        },
        tooltip:{ callbacks:{ label:ctx => ctx.label + ': ' + ctx.raw + ' (' + Math.round(ctx.raw/total*100) + '%)' } }
      }
    }
  });
}

function renderBwCompareChart() {
  const living = filteredData.map(r => r.l).filter(x => x);
  const master = filteredData.map(r => r.m).filter(x => x);
  const bed1 = filteredData.map(r => r.b1).filter(x => x);
  const avg = arr => arr.length ? Math.round(arr.reduce((a,b)=>a+b,0)/arr.length) : 0;
  const allVals = [...living, ...master, ...bed1];
  const yMax = allVals.length ? Math.max(...allVals) * 1.2 : 5000;

  if (charts.bwCompare) charts.bwCompare.destroy();
  charts.bwCompare = new Chart(document.getElementById('chartBwCompare'), {
    type: 'bar',
    data: {
      labels: ['客厅', '主卧', '次卧1'],
      datasets: [
        { label:'最小值', data:[living.length?Math.min(...living):0, master.length?Math.min(...master):0, bed1.length?Math.min(...bed1):0], backgroundColor:'#B5D4F4', borderWidth:0, borderRadius:3 },
        { label:'平均值', data:[avg(living), avg(master), avg(bed1)], backgroundColor:'#1D9E75', borderWidth:0, borderRadius:3 },
        { label:'最大值', data:[living.length?Math.max(...living):0, master.length?Math.max(...master):0, bed1.length?Math.max(...bed1):0], backgroundColor:'#F09595', borderWidth:0, borderRadius:3 }
      ]
    },
    options: {
      responsive:true, maintainAspectRatio:true,
      scales:{ y:{ beginAtZero:true, max:yMax, ticks:{font:{size:11}}, grid:{color:'rgba(0,0,0,0.04)'} }, x:{ ticks:{font:{size:11}}, grid:{display:false} } },
      plugins:{
        legend:{ position:'bottom', labels:{font:{size:12}, padding:12} },
        datalabels:{
          color:'#2c2c2a', font:{weight:'bold',size:10},
          anchor:'end', align:'end', offset:2,
          formatter:v => v > 0 ? v : ''
        },
        tooltip:{ callbacks:{ label:ctx => ctx.dataset.label + ': ' + ctx.raw + ' mm' } }
      }
    }
  });
}

function renderHistogram(canvasId, data, color, label) {
  if (charts[canvasId]) charts[canvasId].destroy();
  if (!data.length) return;

  const step = 500;
  const min = Math.floor(Math.min(...data) / step) * step;
  const max = Math.ceil(Math.max(...data) / step) * step;
  const bins = [], labels = [];
  for (let i = min; i < max; i += step) {
    labels.push((i/1000).toFixed(1)+'-'+((i+step)/1000).toFixed(1));
    bins.push(data.filter(v => v >= i && v < i+step).length);
  }
  const yMax = Math.max(...bins) * 1.2 || 10;

  charts[canvasId] = new Chart(document.getElementById(canvasId), {
    type:'bar',
    data:{ labels, datasets:[{ label:'数量', data:bins, backgroundColor:color, borderWidth:0, borderRadius:3, barThickness:30 }] },
      options:{
        responsive:true, maintainAspectRatio:true,
        scales:{ y:{ beginAtZero:true, max:yMax, ticks:{font:{size:11},precision:0}, grid:{color:'rgba(0,0,0,0.04)'} }, x:{ ticks:{font:{size:10}}, grid:{display:false} } },
        plugins:{
          legend:{display:false},
          datalabels:{
            color:'#2c2c2a', font:{weight:'bold',size:10},
            anchor:'end', align:'end', offset:2,
            formatter:v => v > 0 ? v : ''
          },
          tooltip:{ callbacks:{ label:ctx => ctx.label + 'm: ' + ctx.raw + ' 个' } }
        }
    }
  });
}

// ============ TABLE ============
function renderTable() {
  // Update sort arrows
  document.querySelectorAll('.sort-arrow').forEach(el => {
    const th = el.closest('th');
    const key = th && th.dataset.sort;
    if (key === sortState.key && sortState.dir !== 'none') {
      el.className = 'sort-arrow ' + sortState.dir;
      el.textContent = sortState.dir === 'asc' ? '▲' : '▼';
    } else {
      el.className = 'sort-arrow';
      el.textContent = '⇅';
    }
  });

  const tableBody = document.getElementById('tableBody');
  if (!filteredData.length) {
    tableBody.innerHTML = '<tr><td colspan="12" style="text-align:center;padding:30px;color:#888">无匹配数据</td></tr>';
    return;
  }
  tableBody.innerHTML = filteredData.map((r, i) => `
      <tr>
        <td style="color:#888;font-size:11px">${i + 1}</td>
        <td>${r.d}</td>
        <td>${r.p}</td>
        <td>${r.o || '—'}</td>
        <td>${r.t || '—'}</td>
        <td>${r.a}</td>
        <td><span class="tag tag-${r.c}">${r.c}面宽</span></td>
        <td>${r.l || '—'}</td>
        <td>${r.m || '—'}</td>
        <td>${r.b1 || '—'}</td>
        <td>${r.b2 || '—'}</td>
        <td>${r.img ? '<img class="img-thumb" src="./images/'+r.img+'" onclick="openLightbox(this.src)" alt="户型图">' : '<div class="img-placeholder">无图</div>'}</td>
      </tr>
    `).join('');
}

init();

// ============ LIGHTBOX ============
function openLightbox(src) {
  document.getElementById('lightboxImg').src = src;
  document.getElementById('lightbox').classList.add('show');
}
function closeLightbox(e) {
  if (!e || e.target === e.currentTarget || e.target.classList.contains('close')) {
    document.getElementById('lightbox').classList.remove('show');
  }
}
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') document.getElementById('lightbox').classList.remove('show');
});
</script>
</body>
